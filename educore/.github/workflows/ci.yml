name: EduCore CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       educore_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY:    ci-secret-key-not-for-production
      DEBUG:         "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL:  postgresql://postgres:postgres@localhost:5432/educore_test
      CORS_ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-django

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Check for missing migrations
        run: python manage.py migrate --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install flake8
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,migrations,staticfiles
          # treat warnings as warnings, not errors
          flake8 . --count --max-line-length=120 --statistics \
            --exclude=venv,migrations,staticfiles --exit-zero
