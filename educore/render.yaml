# render.yaml — Infrastructure-as-code for Render.com
# Deploy: connect your GitHub repo → New → Blueprint

services:
  # ── Web (Django + Gunicorn) ──────────────────────────────────────────────
  - type: web
    name: educore-api
    env: python
    region: singapore
    plan: starter
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --workers 4 --threads 2 --worker-class gthread --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /api/core/
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: educore-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://educore-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: educore-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: educore-redis
          type: redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend

  # ── Celery Worker ────────────────────────────────────────────────────────
  - type: worker
    name: educore-celery-worker
    env: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config.celery worker --loglevel=info --concurrency=2
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        fromService:
          name: educore-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: educore-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: educore-redis
          type: redis
          property: connectionString
      - key: DEBUG
        value: "False"

  # ── Celery Beat (scheduler) ──────────────────────────────────────────────
  - type: worker
    name: educore-celery-beat
    env: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        fromService:
          name: educore-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: educore-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: educore-redis
          type: redis
          property: connectionString
      - key: DEBUG
        value: "False"

databases:
  - name: educore-db
    databaseName: educore
    user: educore_user
    plan: starter
    region: singapore

  - name: educore-redis
    type: redis
    plan: starter
    region: singapore

